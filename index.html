  <head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="stylesheet.css">
  </head>
   <script src="counter.js"></script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LVZXN8PT3K"></script>
    <script>

  <body>

    <header>
      <h1>Counter App</h1>
    </header>
    <hr>
    <main>
      <!-- Classic Clicker Section -->
      <div id="classic-count">
        <h2>Classic Clicker</h2>
        <h3>People entered:</h3>
        <h2 id="count-el">0</h2>
        <button id="increment-btn" onclick="increment()">INCREMENT</button><br>
        <button id="save-btn" onclick="save()">SAVE</button><br>
        <button id="reset-btn" onclick="reset()">RESET</button><br>
        <button id="clear-btn" onclick="clearEntries()">CLEAR ENTRIES</button>
        <p id="save-el">Previous entires: </p>
      </div>
      <!-- End of Classic Clicker Section -->
       <hr>
      <!-- Smart Counter Section -->
      <div class="container">
        <h2>Smart Counter</h2>
        <h1 id="value">0</h1>
            
        <div class="input-group">
          <label for="step">Step Value:</label>
          <input type="number" id="step" value="1" min="1">
        </div>
        <br>
        <div class="button-container">
          <button class="btn" id="btn-increase" data-action="increase">Increase</button><br>
        <button class="btn" id="btn-decrease" data-action="decrease">Decrease</button><br>
        <button class="btn" id="btn-reset" data-action="reset">Reset</button>
        </div>
      </div>
      <!-- End of Smart Counter Section -->
       <hr>
      <!-- prductivty counter-->
      <div class="pomodoro-container">
        <h2>Focus Timer</h2>
        <div class="input-group">
          <label for="timer-minutes">Timer Duration (minutes):</label>
          <input type="number" id="timer-minutes" value="25" min="1" max="120">
        </div>
        <div id="timer-display">25:00</div>
        <br>
        <div class="controls">
          <button id="start">Start</button><br>
          <button id="pause">Pause</button><br>
          <button id="reset">Reset</button>
        </div>
      </div>
      <!-- end of productivity counter-->
    </main>
