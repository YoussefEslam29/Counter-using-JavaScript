<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="stylesheet.css">
  </head>

  <body>
    <!-- Hamburger Menu -->
    <div class="hamburger-menu">
      <button class="hamburger-btn" onclick="toggleMenu()">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
      <nav class="menu" id="menu">
        <a href="#">Home</a>
        <a href="about.html">About</a>
      </nav>
    </div>
    <!-- End of Hamburger Menu -->

    <header>
      <h1>Counter App</h1>
    </header>

    <main>
      <!-- Classic Clicker Section -->
      <div id="classic-count">
        <h2>Classic Clicker</h2>
        <h3>People entered:</h3>
        <h2 id="count-el">0</h2>
        <button id="increment-btn" onclick="increment()">INCREMENT</button>
        <button id="save-btn" onclick="save()">SAVE</button>
        <button id="reset-btn" onclick="reset()">RESET</button>
        <button id="clear-btn" onclick="clearEntries()">CLEAR ENTRIES</button>
        <p id="save-el">Previous entires: </p>
      </div>
      <!-- End of Classic Clicker Section -->
       <hr>
      <!-- Smart Counter Section -->
      <div class="container">
        <h2>Smart Counter</h2>
        <h1 id="value">0</h1>
            
        <div class="input-group">
          <label for="step">Step Value:</label>
          <input type="number" id="step" value="1" min="1">
        </div>

        <div class="button-container">
        <button class="btn" data-action="decrease">Decrease</button>
        <button class="btn" data-action="reset">Reset</button>
        <button class="btn" data-action="increase">Increase</button>
        </div>
      </div>
      <!-- End of Smart Counter Section -->
       <hr>
      

    </main>

  </body>
</html>
